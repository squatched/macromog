# Macromog Example Macros
# Sparse format - only defined books, sets, and macros are present
# Book indices are 0-based (0-39) in exported files

books:
  0:
    name: "WHM75"
    sets:
      0:
        ctrl:
          0:
            name: "Cure"
            contents:
              - "/ma 'Cure IV' <me>"
              - "/wait 1"
          1:
            name: "Esuna"
            contents:
              - "/ma Esuna <me>"
        alt:
          0:
            name: "Protect"
            contents:
              - "/ma Protectra V <me>"
      1:
        ctrl:
          0:
            name: "Idle"
            contents:
              - "/equipset 1"
              - "/echo Idle set on, kupo!"
  5:
    name: "RDM75NIN"
    sets:
      0:
        ctrl:
          0:
            name: "WS"
            contents:
              - "/ws 'Savage Blade' <t>"
          1:
            name: "Convert"
            contents:
              - "/ja Convert <me>"
              - "/wait 2"
              - "/ma 'Cure IV' <me>"
# ... add more books/sets as needed
