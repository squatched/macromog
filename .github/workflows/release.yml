name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Pull the block between ## [VERSION] and the next ## [
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "ERROR: No CHANGELOG.md entry found for v$VERSION" >&2
            echo "Add a '## [$VERSION]' section before tagging." >&2
            exit 1
          fi
          echo "$NOTES" > release_notes.txt
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package addon
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          zip -r "macromog-${VERSION}.zip" \
            macromog.lua lib/ data/.gitkeep README.md CHANGELOG.md LICENSE \
            --exclude "data/*.bak" --exclude "data/*_backup_*.yml"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Macromog v${{ steps.changelog.outputs.version }}"
          body_path: release_notes.txt
          files: "macromog-${{ steps.changelog.outputs.version }}.zip"
          draft: false
          prerelease: false
