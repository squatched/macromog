name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install Lua dependencies
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install busted
          sudo luarocks install luacov
          sudo luarocks install luacov-cobertura

      - name: validate-coverage
        run: make validate-coverage

      - name: Upload coverage.xml
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')

            let coveragePct = null
            let fileTable = ''
            try {
              const report = fs.readFileSync('luacov.report.out', 'utf8')
              // Parse per-file lines: "lib/foo.lua  45  2  95.65%"
              const fileRows = []
              for (const line of report.split('\n')) {
                const m = line.match(/^(\S+\.lua)\s+(\d+)\s+(\d+)\s+([\d.]+)%/)
                if (m) fileRows.push(`| \`${m[1]}\` | ${m[2]} | ${m[3]} | ${m[4]}% |`)
              }
              if (fileRows.length) {
                fileTable = [
                  '| File | Hits | Missed | Coverage |',
                  '|------|------|--------|----------|',
                  ...fileRows,
                ].join('\n')
              }
              const totMatch = report.match(/^Total\s+\d+\s+\d+\s+([\d.]+)%/m)
              if (totMatch) coveragePct = parseFloat(totMatch[1])
            } catch (_) {}

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const threshold = 80
            const passed = coveragePct !== null && coveragePct >= threshold
            const status = passed ? '✅' : '❌'
            const pctDisplay = coveragePct !== null ? `${coveragePct.toFixed(2)}%` : 'unknown'

            const body = [
              `## ${status} Coverage Report — ${pctDisplay}`,
              '',
              passed
                ? `Coverage meets the ${threshold}% threshold.`
                : `Coverage is below the ${threshold}% threshold. Download [\`coverage.xml\`](${runUrl}) to identify gaps.`,
              '',
              fileTable,
              '',
              `[View workflow run](${runUrl})`,
            ].filter(Boolean).join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.body.includes('Coverage Report'))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
