name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install Lua dependencies
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install busted
          sudo luarocks install luacov
          sudo luarocks install luacov-cobertura
          sudo luarocks install luacov-html

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: validate-plugin-coverage
        run: make validate-plugin-coverage

      - name: validate-cli-coverage
        run: make validate-cli-coverage

      - name: Generate coverage reports
        if: always()
        run: |
          [ -f coverage-cli.out ] && go tool cover -func=coverage-cli.out > coverage-cli-func.txt || true
          [ -f coverage-cli.out ] && go tool cover -html=coverage-cli.out -o coverage-cli.html || true
          [ -f luacov.stats.out ] && luacov-html || true

      - name: Upload plugin coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-plugin
          path: |
            coverage-plugin.xml
            luacov-html/
          if-no-files-found: warn

      - name: Upload CLI coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-cli
          path: |
            coverage-cli.out
            coverage-cli.html
          if-no-files-found: warn

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs')
            const MARKER = '<!-- macromog-coverage -->'

            // ── Plugin Coverage (Lua) ──────────────────────────────────────
            let pluginPct = null
            let pluginTable = ''
            try {
              const report = fs.readFileSync('luacov.report.out', 'utf8')
              const fileRows = []
              for (const line of report.split('\n')) {
                const m = line.match(/^(\S+\.lua)\s+(\d+)\s+(\d+)\s+([\d.]+)%/)
                if (m) fileRows.push(`| \`${m[1]}\` | ${m[2]} | ${m[3]} | ${m[4]}% |`)
              }
              if (fileRows.length) {
                pluginTable = [
                  '| File | Hits | Missed | Coverage |',
                  '|------|------|--------|----------|',
                  ...fileRows,
                ].join('\n')
              }
              const tot = report.match(/^Total\s+\d+\s+\d+\s+([\d.]+)%/m)
              if (tot) pluginPct = parseFloat(tot[1])
            } catch (_) {}

            // ── CLI Coverage (Go) ──────────────────────────────────────────
            let cliPct = null
            let cliTable = ''
            try {
              const report = fs.readFileSync('coverage-cli-func.txt', 'utf8')
              const funcRows = []
              for (const line of report.split('\n')) {
                // e.g. github.com/owner/repo/cmd/macromog/main.go:24:  main  0.0%
                const m = line.match(/^(\S+):(\d+):\s+(\S+)\s+([\d.]+)%/)
                if (m) {
                  // strip module prefix (github.com/owner/repo/)
                  const file = m[1].replace(/^[^/]+\/[^/]+\/[^/]+\//, '')
                  funcRows.push(`| \`${file}\` | \`${m[3]}\` | ${m[4]}% |`)
                }
              }
              if (funcRows.length) {
                cliTable = [
                  '| File | Function | Coverage |',
                  '|------|----------|----------|',
                  ...funcRows,
                ].join('\n')
              }
              const tot = report.match(/^total:\s+\(statements\)\s+([\d.]+)%/m)
              if (tot) cliPct = parseFloat(tot[1])
            } catch (_) {}

            // ── Compose comment ────────────────────────────────────────────
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const pluginThreshold = 80
            const cliThreshold = 0

            const pluginPassed = pluginPct !== null && pluginPct >= pluginThreshold
            const cliPassed   = cliPct   !== null && cliPct   >= cliThreshold

            const fmt = (pct) => pct !== null ? `${pct.toFixed(2)}%` : 'unknown'
            const icon = (ok) => ok ? '✅' : '❌'

            const pluginSection = [
              `### ${icon(pluginPassed)} Plugin Coverage — ${fmt(pluginPct)}`,
              '',
              pluginPassed
                ? `Meets the ${pluginThreshold}% threshold.`
                : `Below the ${pluginThreshold}% threshold.`,
              '',
              pluginTable,
              '',
              '> **`coverage-plugin` artifact** — open `luacov-html/index.html` for a visual report.',
              '> Also includes `coverage-plugin.xml` (Cobertura) for IDE plugins such as Coverage Gutters.',
            ].filter(s => s !== undefined).join('\n')

            const cliSection = [
              `### ${icon(cliPassed)} CLI Coverage — ${fmt(cliPct)}`,
              '',
              cliPassed
                ? `Meets the ${cliThreshold}% threshold.`
                : `Below the ${cliThreshold}% threshold.`,
              '',
              cliTable,
              '',
              '> **`coverage-cli` artifact** — open `coverage-cli.html` for an annotated source report.',
              '> Also includes `coverage-cli.out` (Go cover profile) for local tooling.',
            ].filter(s => s !== undefined).join('\n')

            const body = [
              MARKER,
              '## Coverage Report',
              '',
              pluginSection,
              '',
              cliSection,
              '',
              `[Download artifacts / view run](${runUrl})`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.body.includes(MARKER))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
