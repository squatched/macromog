name: Build and Release

on:
  workflow_dispatch: # Trigger this manually after a release-please PR is merged.

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mingw-w64 (for Windows builds)
        run: sudo apt-get update -y && sudo apt-get install -y gcc-mingw-w64-i686

      - name: Read version from version.txt
        id: version
        run: |
          VERSION=$(cat version.txt)
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release version detected: ${VERSION} (${TAG})"

      # Build Go binaries (Linux + Windows)
      - name: Build Release Binaries
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: make build-release-bins VERSION="$VERSION"

      # Package plugin (generates ZIP with bundled DLL and assets)
      - name: Package Plugin
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: make package-plugin VERSION="$VERSION"

      # Validate the package before uploading
      - name: Validate Plugin Package
        run: make validate-plugin-package

      # Prepare and list artifacts for verification
      - name: Prepare and List Generated Artifacts
        run: |
          mkdir artifacts
          cp dist/bin/macromog artifacts/macromog-linux-amd64
          cp dist/bin/macromog.exe artifacts/macromog-windows-386.exe
          cp dist/macromog-*.zip artifacts/
          chmod +x artifacts/macromog-linux-amd64

          echo "=== artifacts ==="
          ls -lh artifacts/

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --draft=false \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload all release assets
      - name: Upload to Release
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "artifacts/macromog-${{ steps.version.outputs.tag }}.zip" \
            artifacts/macromog-linux-amd64 \
            artifacts/macromog-windows-386.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
