name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          release-type: simple

  package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries and addon zip
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          make build-release-bins package-plugin VERSION="$VERSION"

      - name: Upload to release
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${{ needs.release-please.outputs.version }}"
          gh release upload "$TAG" \
            "dist/macromog-${VERSION}.zip" \
            dist/bin/macromog-linux-amd64 \
            dist/bin/macromog-linux-386 \
            dist/bin/macromog-windows-amd64.exe \
            dist/bin/macromog-windows-386.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}