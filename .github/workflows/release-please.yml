name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and upload (e.g. 1.0.1); defaults to version.txt"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install mingw-w64
        run: sudo apt-get update -y && sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build release binaries and addon zip
        run: |
          VERSION="${{ needs.release-please.outputs.version || inputs.version }}"
          VERSION="${VERSION:-$(tr -d '\n\r' < version.txt)}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          make package-plugin VERSION="$VERSION"

      - name: Upload to release
        run: |
          gh release upload "v${VERSION}" \
            "dist/macromog-${VERSION}.zip" \
            "dist/bin/macromog-linux-amd64" \
            "dist/bin/macromog-windows-386.exe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
