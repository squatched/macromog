name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-lint:
    name: validate-plugin-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install luacheck
        run: |
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: validate-plugin-lint
        run: make validate-plugin-lint

  plugin-format:
    name: validate-plugin-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install StyLua
        run: |
          curl -fsSL https://github.com/JohnnyMorganz/StyLua/releases/latest/download/stylua-linux-x86_64.zip \
            -o stylua.zip
          unzip -q stylua.zip
          sudo mv stylua /usr/local/bin/stylua

      - name: validate-plugin-format
        run: make validate-plugin-format
