name: Upload Release Artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and upload (e.g. 1.0.1); defaults to version.txt"
        required: false

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install mingw-w64
        run: sudo apt-get update -y && sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build release binaries and addon zip
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION:-$(tr -d '\n\r' < version.txt)}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          make package-plugin VERSION="$VERSION"

      - name: Upload to release
        run: |
          gh release upload "v${VERSION}" \
            "dist/macromog-${VERSION}.zip" \
            "dist/bin/macromog-linux-amd64" \
            "dist/bin/macromog-windows-386.exe"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
